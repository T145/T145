name: Generate GitHub Stats Images

on:
  schedule:
    - cron: "0 */12 * * *" # Every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Clone github-readme-stats
        run: git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/github-readme-stats

      - name: Install github-readme-stats dependencies
        working-directory: /tmp/github-readme-stats
        run: npm install --omit=dev --ignore-scripts

      - name: Generate stats images
        env:
          PAT_1: ${{ github.token }}
        run: node scripts/generate-stats.mjs

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add images/github-stats.svg images/top-languages.svg
          git diff --staged --quiet || (git commit --amend --no-edit && git push --force)
